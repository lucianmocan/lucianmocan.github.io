---
layout: default
---
<article class="project">
    <div class="project-header">
        <h3>{{ page.title }}</h3>
    </div>
    <div class="project-content">
        {{ content }}
    </div>
    <footer class="post-footer">
        <time class="post-date-md">{{ page.date | date: "%B %d, %Y" }}</time>
    </footer>
</article>
