title: Lucian Mocan
description: Systems researcher/engineer and software engineer working on systems, developer tools, and AI-assisted research automation.
url: "https://lucianmocan.github.io"
baseurl: ""
permalink: /blog/:title/
sass:
  load_paths:
    - assets/css/_sass
  style: compressed

# Basic site structure
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "songs"
    values:
      layout: "song"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Collections
collections:
  songs:
    output: true
    permalink: /songs/:title/
  projects:
    output: true
    permalink: /projects/:title/

# Social links
social:
  twitter: luciantqt
  github: lucianmocan
  email: lib.lucianmocan@gmail.com

plugins:
  - jekyll-seo-tag
